name: ios

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # ===== APP CONFIG =====
  APP_NAME: AndyTV
  CSPROJ_PATH: ./AndyTV.Maui/AndyTV.Maui.csproj
  BUNDLE_ID: com.ajh.AndyTV
  APPLE_TEAM_ID: 55P33KNTP3
  CODESIGN_KEY: "Apple Distribution: Andrew Herrick (55P33KNTP3)"
  CODESIGN_PROVISION: "AndyTV"
  IPA_PATH: publishapp/AndyTV.Maui.ipa
  IPA_NAME: AndyTV.Maui.ipa

  # ===== AZURE STORAGE (for OTA hosting) =====
  STATIC_URL: "https://andytvstorage.z19.web.core.windows.net"
  AZURE_STORAGE_ACCOUNT: "andytvstorage"

jobs:
  build-ios-adhoc:
    runs-on: [self-hosted, ajmacmini]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI
        run: dotnet workload install maui
        
      - name: Verify imported identity
        run: |
          security find-identity -v -p codesigning      
          
      - name: Delete existing build keychain
        run: security delete-keychain build.keychain || true

      - name: Install Apple Certificates
        run: |
          echo "${{ secrets.CERTIFICATES_P12_BASE64 }}" | base64 --decode -o /tmp/cert.p12
          security create-keychain -p "${{ secrets.CERTIFICATES_P12_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security unlock-keychain -p "${{ secrets.CERTIFICATES_P12_PASSWORD }}" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "${{ secrets.CERTIFICATES_P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.CERTIFICATES_P12_PASSWORD }}" build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          rm /tmp/cert.p12

      - name: List code signing identities
        run: security find-identity -v -p codesigning build.keychain

      - name: Download provisioning profile (Ad Hoc)
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          profile-type: IOS_APP_ADHOC
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Update app version
        uses: managedcode/MAUIAppVersion@v1
        with:
          csproj: ${{ env.CSPROJ_PATH }}
          version: 1.0.${{ github.run_number }}
          displayVersion: 1.0.${{ github.run_number }}
          printFile: false

      - name: Build iOS IPA (Ad Hoc)
        run: |
          dotnet publish ${{ env.CSPROJ_PATH }} \
            -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:EnableWindowsTargeting=true \
            -p:ArchiveOnBuild=true \
            -p:PackageApp=true \
            -p:BuildIpa=true \
            -p:BundleIdentifier="${{ env.BUNDLE_ID }}" \
            -p:CodesignTeamId="${{ env.APPLE_TEAM_ID }}" \
            -p:CodesignKey="${{ env.CODESIGN_KEY }}" \
            -p:CodesignProvision="${{ env.CODESIGN_PROVISION }}" \
            -p:MtouchInterpreter="-all,LibVLCSharp.MAUI,LibVLCSharp" \
            -o publishapp

      - name: Upload to Azure & Generate OTA Install
        id: ota
        uses: aherrick/ios-adhoc-ota@main
        with:
          app_name: ${{ env.APP_NAME }}
          bundle_id: ${{ env.BUNDLE_ID }}
          version: 1.0.${{ github.run_number }}
          ipa_name: ${{ env.IPA_NAME }}
          ipa_path: ${{ env.IPA_PATH }}
          static_url: ${{ env.STATIC_URL }}
          azure_storage_account: ${{ env.AZURE_STORAGE_ACCOUNT }}
          azure_storage_key: ${{ secrets.AZURE_STORAGE_KEY }}

      - name: Show install URLs
        run: |
          echo "Landing page:  ${{ steps.ota.outputs.landing_page_url }}"
          echo "Manifest:      ${{ steps.ota.outputs.manifest_url }}"
          echo "IPA:           ${{ steps.ota.outputs.ipa_url }}"
